name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Deploy API + Proxy + DB stack to DigitalOcean ────────────────────────────
  deploy-api:
    name: Deploy API to DigitalOcean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e

            # ── Clone or update repo ─────────────────────────────────
            if [ ! -d "/opt/agentlens" ]; then
              git clone https://github.com/farzanhossan/agentlens /opt/agentlens
            fi

            cd /opt/agentlens
            git fetch origin main
            git reset --hard origin/main

            # ── Ensure .env exists with secrets ──────────────────────
            ENV_FILE="infra/.env"
            if [ ! -f "$ENV_FILE" ]; then
              cp infra/.env.prod.example "$ENV_FILE"
            fi

            # Update secrets from GitHub (only overwrite if value is non-empty)
            set_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return 0
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }

            set_env "JWT_SECRET"       "dev-jwt-secret"
            set_env "HMAC_SECRET"      "dev-hmac-secret"
            set_env "POSTGRES_PASSWORD" "agentlens"
            set_env "REDIS_PASSWORD"   "agentlens"
            set_env "RESEND_API_KEY"   "${{ secrets.RESEND_API_KEY }}"
            set_env "ALERT_EMAIL_FROM" "${{ secrets.ALERT_EMAIL_FROM }}"
            set_env "CORS_ORIGIN"      "https://project-crqpe.vercel.app,http://localhost:5173,http://localhost:4021"
            set_env "FRONTEND_URL"     "https://project-crqpe.vercel.app"
            set_env "VITE_API_URL"     "https://api-agentlens.techmatbd.com"
            set_env "VITE_WS_URL"      "https://api-agentlens.techmatbd.com"
            set_env "API_PORT"         "4020"
            set_env "DASHBOARD_PORT"   "4021"
            set_env "PROXY_PORT"       "8090"

            # ── Detect docker compose version ────────────────────────
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            # ── Stop old containers to free ports ────────────────────
            $DC -f infra/docker-compose.prod.yml down --remove-orphans || true
            # Kill any orphaned containers still holding ports
            docker ps -q --filter "name=infra-" | xargs -r docker rm -f || true
            docker ps -q --filter "name=agentlens-" | xargs -r docker rm -f || true

            # ── Bring up the full stack ──────────────────────────────
            $DC -f infra/docker-compose.prod.yml up -d --build

            # ── Health checks ────────────────────────────────────────
            echo "Waiting for services to start..."
            sleep 25

            API_PORT=$(grep -E '^API_PORT=' "$ENV_FILE" | cut -d= -f2)
            API_PORT="${API_PORT:-4020}"

            curl -f "http://localhost:${API_PORT}/health" && echo " ✅ API healthy" || echo " ⚠️ API health check failed"

  # ── Deploy Dashboard to Vercel ───────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

  # ── Deploy Landing page to Vercel ────────────────────────────────────────────
  deploy-landing:
    name: Deploy Landing to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/landing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/landing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/landing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

  # ── Deploy Ingest Worker to Cloudflare ───────────────────────────────────────
  deploy-worker:
    name: Deploy Ingest Worker to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install latest wrangler
        run: npm install -g wrangler@latest

      - name: Set Cloudflare Worker secrets
        working-directory: apps/ingest-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.HMAC_SECRET }}" | wrangler secret put HMAC_SECRET
          echo "${{ secrets.WORKER_SECRET }}" | wrangler secret put WORKER_SECRET

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy --env=""
        working-directory: apps/ingest-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
