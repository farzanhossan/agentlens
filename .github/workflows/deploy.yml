name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to DigitalOcean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e

            if [ ! -d "/opt/agentlens" ]; then
              git clone https://github.com/farzanhossan/agentlens /opt/agentlens
            fi

            cd /opt/agentlens
            git fetch origin main
            git reset --hard origin/main

            which pnpm || npm install -g pnpm
            pnpm install --frozen-lockfile

            pnpm --filter @farzanhossans/agentlens-api run migration:run || true

            docker-compose -f infra/docker-compose.prod.yml up -d --build api

            sleep 10
            curl -f http://localhost:3000/health && echo "Health check passed"

  deploy-dashboard:
    name: Deploy Dashboard to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @farzanhossans/agentlens-dashboard build
        env:
          VITE_API_URL: https://api.agentlens.dev
          VITE_WS_URL: wss://api.agentlens.dev

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

  deploy-landing:
    name: Deploy Landing to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/landing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}

  deploy-worker:
    name: Deploy Ingest Worker to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install latest wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        working-directory: apps/ingest-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
