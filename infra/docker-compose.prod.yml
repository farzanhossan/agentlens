version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://agentlens:agentlens@postgres:5432/agentlens
      REDIS_URL: redis://:agentlens@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: agentlens
      HMAC_SECRET: agentlens
      RESEND_API_KEY: re_skip
      FRONTEND_URL: https://app.agentlens.dev
      PORT: 3000
    ports:
      - "4020:3000"
    networks:
      - agentlens-prod

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: agentlens
      POSTGRES_USER: agentlens
      POSTGRES_PASSWORD: agentlens
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlens -d agentlens"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - agentlens-prod

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory-policy noeviction --requirepass agentlens
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "agentlens", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - agentlens-prod

  elasticsearch:
    image: elasticsearch:8.13.0
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - bootstrap.memory_lock=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agentlens-prod

volumes:
  postgres_data:
  redis_data:
  es_data:

networks:
  agentlens-prod:
    driver: bridge
