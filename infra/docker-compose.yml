version: "3.9"

networks:
  agentlens-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data:

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agentlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentlens
      POSTGRES_USER: agentlens
      POSTGRES_PASSWORD: agentlens
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlens -d agentlens"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - agentlens-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentlens-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory-policy
      - noeviction
      - --appendonly
      - "yes"
      - --loglevel
      - warning
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - agentlens-net

  # ── Elasticsearch ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: agentlens-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -s http://localhost:9200/_cluster/health | grep -qE "\"status\":\"(green|yellow)\""'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - agentlens-net

  # ── Kibana (optional — dev debugging only) ────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: agentlens-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    profiles:
      - debug
    networks:
      - agentlens-net
