server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any path that doesn't match a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Vite fingerprints them by content hash
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html so new deployments are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
}
